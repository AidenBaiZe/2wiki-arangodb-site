name: 发布网页

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 取出仓库文件
        uses: actions/checkout@v4

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传网页文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 发布到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
